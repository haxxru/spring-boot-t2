<!doctype html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>게시글 상세</title>
</head>
<body>
<main>
	<fieldset>
		<h1>게시글 상세</h1>
		<a href="/article/list">목록</a>
		<a th:href="@{/article/modify/{id}(id=${article.id})}">수정</a>
	</fieldset>

	<fieldset>
		<p>
			<strong>번호:</strong>
			<span th:text="${article.id}">1</span>
		</p>
		<p>
			<strong>제목:</strong>
			<span th:text="${article.title}">제목</span>
		</p>
		<p>
			<strong>내용:</strong>
		</p>
		<p th:text="${article.content}">내용</p>
	</fieldset>
</main>
</body>
</html>
