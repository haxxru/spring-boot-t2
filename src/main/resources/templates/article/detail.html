<!doctype html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>게시글 상세</title>
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbarFragment}"></nav>
<main>
	<fieldset>
		<h1>게시글 상세</h1>
		<form method="get" action="/article/list" style="display:inline;">
			<button type="submit">목록</button>
		</form>
		<form method="get" th:action="@{/article/modify/{id}(id=${article.id})}" style="display:inline;">
			<button type="submit">수정</button>
		</form>
		<form method="post" th:action="@{/article/delete/{id}(id=${article.id})}" style="display:inline;">
			<button type="submit">삭제</button>
		</form>
	</fieldset>

	<fieldset>
		<p>
			<strong>번호:</strong>
			<span th:text="${article.id}">1</span>
		</p>
		<p>
			<strong>제목:</strong>
			<span th:text="${article.title}">제목</span>
		</p>
		<p>
			<strong>내용:</strong>
		</p>
		<p th:text="${article.content}">내용</p>
	</fieldset>
</main>
</body>
</html>
