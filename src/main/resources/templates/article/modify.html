<!doctype html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>게시글 수정</title>
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbarFragment}"></nav>
<main>
	<fieldset>
		<h1>게시글 수정</h1>
		<a th:href="@{/article/detail/{id}(id=${article.id})}">상세</a>
		<a href="/article/list">목록</a>
	</fieldset>

	<form method="post" th:action="@{/article/modify/{id}(id=${article.id})}">
		<fieldset>
			<p>
				<label for="title">제목</label>
			</p>
			<p>
				<input type="text" id="title" name="title" th:value="${article.title}" required>
			</p>

			<p>
				<label for="content">내용</label>
			</p>
			<p>
				<textarea id="content" name="content" rows="10" cols="60" required th:text="${article.content}"></textarea>
			</p>

			<p>
				<button type="submit">수정</button>
			</p>
		</fieldset>
	</form>
</main>
</body>
</html>
