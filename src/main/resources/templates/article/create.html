<!doctype html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>게시글 등록</title>
</head>
<body>
<main>
	<fieldset>
		<h1>게시글 등록</h1>
		<a href="/article/list">목록</a>
	</fieldset>

	<form method="post" action="/article/create">
		<fieldset>
			<p>
				<label for="title">제목</label>
			</p>
			<p>
				<input type="text" id="title" name="title" required>
			</p>

			<p>
				<label for="content">내용</label>
			</p>
			<p>
				<textarea id="content" name="content" rows="10" cols="60" required></textarea>
			</p>

			<p>
				<button type="submit">등록</button>
			</p>
		</fieldset>
	</form>
</main>
</body>
</html>
